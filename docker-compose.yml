services:
  api:
    build: .
    ports:
      - "8010:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_chat
    # Host port mapping is intentionally omitted to avoid conflicts

  redis:
    image: redis:7-alpine
    # Host port mapping is intentionally omitted to avoid conflicts
    # with other local docker-compose stacks using :6379.

